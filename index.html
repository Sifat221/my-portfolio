<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Joy Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🔥 GRID BACKGROUND -->
  <div class="bg"></div>

  <!-- NAVBAR -->
  <nav>
    <h2>[ Joy ]</h2>
    <div>
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">

    <div class="left">
      <p class="tag">$ flutter</p>

      <h1 class="big-text">JOY</h1>

      <!-- 🔥 GRADIENT TEXT -->
      <h3 class="gradient-text">Flutter Developer</h3>

      <p class="desc">
        I build modern mobile apps with beautiful UI & performance.
      </p>

      <div class="buttons">
        <a href="#">View My Work</a>
        <a href="#">Contact Me</a>
      </div>
    </div>

    <div class="right">
      <img src="https://i.ibb.co/4pDNDk1/avatar.png" class="avatar">
    </div>

  </section>
  <canvas id="particles"></canvas>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: (Math.random() - 0.5),
    dy: (Math.random() - 0.5)
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "#38bdf8";
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
